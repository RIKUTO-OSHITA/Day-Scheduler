<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day Schedule</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-bg"></div>
    <main class="shell">
      <header class="topbar">
        <div class="date-panel">
          <p class="eyebrow">OPEN DATE</p>
          <h1 id="opened-date">--</h1>
        </div>
        <div class="controls">
          <label for="date-input">日付</label>
          <input id="date-input" type="date" />
        </div>
      </header>

      <section class="workspace">
        <aside class="task-editor">
          <h2>タスク入力</h2>
          <p class="helper">開始時刻と終了時刻は 07:30-18:00 のプルダウンから選択します。入力値は 15 分刻みに正規化されます。</p>
          <form id="task-form">
            <label for="task-title">タイトル</label>
            <input id="task-title" type="text" required maxlength="60" placeholder="例: 顧客MTG" />

            <label for="task-start">開始時刻</label>
            <select id="task-start" required></select>

            <label for="task-end">終了時刻</label>
            <select id="task-end" required></select>

            <div class="actions">
              <button type="submit">保存</button>
              <button id="reset-btn" type="button" class="ghost">リセット</button>
            </div>
          </form>
        </aside>

        <section class="schedule-card" aria-label="day schedule">
          <div class="timeline-head">
            <h2>Daily Timeline</h2>
            <p>07:30 - 18:00（時間軸ラベル: 30分単位）</p>
          </div>
          <div id="timeline" class="timeline-grid"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
